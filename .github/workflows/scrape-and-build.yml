name: Scrape and Build

on:
  push:
    branches:
      - master
  schedule:
    # 00:30 CET (23:30 UTC) and CEST (22:30 UTC)
    - cron: '30 22,23 * * *'
    # 09:00 CET (08:00 UTC) and CEST (07:00 UTC)
    - cron: '0 7,8 * * *'
    # 12:30 CET (11:30 UTC) and CEST (10:30 UTC)
    - cron: '30 10,11 * * *'
    # 15:30 CET (14:30 UTC) and CEST (13:30 UTC)
    - cron: '30 13,14 * * *'
    # 18:30 CET (17:30 UTC) and CEST (16:30 UTC)
    - cron: '30 16,17 * * *'
    # 21:15 CET (20:15 UTC) and CEST (19:15 UTC)
    - cron: '15 19,20 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape-and-build:
    runs-on: ubuntu-latest
    # Set the timezone for the entire job
    env:
      TZ: 'Europe/Belgrade'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Configure Git User
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"

      - name: Install Dependencies
        run: npm install

      - name: Run Scraper
        if: github.event_name == 'schedule'
        run: npm run scrape

      - name: Check for Data Changes
        id: data_check
        run: |
          # Stage files in the specified directories
          git add src/data/json src/data/csv

          # Check if there are staged changes
          if git diff --staged --quiet; then
            echo "No changes found in data directories. Stopping here."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"

            # Check for specifically newly added files (A = Added)
            if [ -n "$(git diff --staged --name-only --diff-filter=A)" ]; then
              echo "commit_type=TV schedule" >> "$GITHUB_OUTPUT"
            else
              echo "commit_type=Update TV schedule" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Commit TV Schedule Data
        if: steps.data_check.outputs.has_changes == 'true'
        run: |
          # Because of TZ='Europe/Belgrade', this will now output the correct Belgrade date
          DATE=$(date +'%Y-%m-%d')
          PREFIX="${{ steps.data_check.outputs.commit_type }}"
          git commit -m "$PREFIX $DATE"

      - name: Build Website
        if: steps.data_check.outputs.has_changes == 'true' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: npm run build

      - name: Commit Build & Push All
        id: build_commit
        if: steps.data_check.outputs.has_changes == 'true' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          git add index.html

          # Only commit the build if index.html actually changed
          if ! git diff --staged --quiet; then
            DATE=$(date +'%Y-%m-%d')
            git commit -m "Automated build $DATE"
            echo "has_build_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_build_changes=false" >> "$GITHUB_OUTPUT"
          fi

          # Push data commit (and build commit, if it happened)
          git push

      - name: Setup Pages
        if: steps.build_commit.outputs.has_build_changes == 'true'
        uses: actions/configure-pages@v6

      - name: Prepare deployment folder
        if: steps.build_commit.outputs.has_build_changes == 'true'
        run: |
          # Create temporary directory '_site'
          mkdir _site
          cp index.html site.webmanifest _site/
          cp src/web/public/*.{png,ico} _site/

      - name: Upload artifact
        if: steps.build_commit.outputs.has_build_changes == 'true'
        uses: actions/upload-pages-artifact@v5
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        if: steps.build_commit.outputs.has_build_changes == 'true'
        id: deployment
        uses: actions/deploy-pages@v5
