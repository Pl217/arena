      :root {
  --bg-color: #f5f5f5;
  --text-color: #333;
  --card-bg: #fff;
  --primary-color: #0056b3;
  --border-color: #ddd;
  --drawer-bg: #fff;
  --overlay-bg: rgba(0,0,0,0.5);
  --text-muted: #777;
  --badge-bg-desktop: #e9ecef;
  --badge-text-desktop: #495057;
  --badge-bg-mobile: #f7f7f7;
  --badge-text-mobile: #777;
}

:root.dark {
  --bg-color: #121212;
  --text-color: #e0e0e0;
  --card-bg: #1e1e1e;
  --primary-color: #4da3ff;
  --border-color: #333;
  --drawer-bg: #1e1e1e;
  --text-muted: #aaa;
  --badge-bg-desktop: #343a40;
  --badge-text-desktop: #f8f9fa;
  --badge-bg-mobile: #131313;
  --badge-text-mobile: #ccc;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

#menu-btn {
  position: relative;
}

#menu-btn.has-new::after {
  content: attr(data-new-count);
  position: absolute;
  top: 0px;
  right: 0px;
  min-width: 16px;
  height: 16px;
  background-color: #007bff;
  color: white;
  font-size: 10px;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 4px;
  padding: 0 4px;
  box-sizing: border-box;
  box-shadow: 0 0 0 0 rgba(0, 123, 255, 0.7);
  animation: pulse-blue 1.5s infinite;
}

@keyframes pulse-blue {
  0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 123, 255, 0.7); }
  70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(0, 123, 255, 0); }
  100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 123, 255, 0); }
}

#menu-btn,
#close-drawer,
.drawer-overlay {
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background-color: var(--bg-color);
  color: var(--text-color);
  line-height: 1.5;
}

.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1rem;
  background-color: var(--card-bg);
  border-bottom: 1px solid var(--border-color);
  position: sticky;
  top: 0;
  z-index: 15;
}

.header h1 {
  font-size: 1.25rem;
  font-weight: 600;
}

.icon-btn {
  background: none;
  border: none;
  font-size: 1.5rem;
  color: var(--text-color);
  cursor: pointer;
  padding: 0.5rem;
  border-radius: 4px;
}

.icon-btn:hover {
  background-color: var(--border-color);
}

.icon-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

.drawer {
  position: fixed;
  top: 0;
  left: -300px;
  width: 300px;
  height: 100%;
  background-color: var(--drawer-bg);
  box-shadow: 2px 0 5px rgba(0,0,0,0.1);
  transition: left 0.3s ease;
  z-index: 30;
  display: flex;
  flex-direction: column;
}

.drawer.open {
  left: 0;
}

.drawer-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1rem;
  border-bottom: 1px solid var(--border-color);
}

.drawer-content {
  flex: 1;
  overflow-y: auto;
  padding: 0 1rem 1rem;
}

.drawer-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: var(--overlay-bg);
  z-index: 20;
  display: none;
}

.drawer-overlay.open {
  display: block;
}

.filter-group {
  margin-bottom: 1rem;
}

.filter-sport {
  font-weight: bold;
  margin-bottom: 0.5rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.filter-leagues {
  margin-left: 1.5rem;
  display: flex;
  flex-direction: column;
  gap: 0.25rem;
}

.is-new-item {
  display: inline-flex;
  align-items: center;
}

.is-new-item::after {
  content: "";
  display: block;
  width: 8px;
  height: 8px;
  background-color: #007bff;
  border-radius: 50%;
  margin-left: 6px;
  box-shadow: 0 0 0 0 rgba(0, 123, 255, 0.7);
  animation: pulse-blue 1.5s infinite;
}

.filter-league {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.9rem;
}

.main-content {
  max-width: 800px;
  margin: 0 auto;
  padding: 1rem 1rem 7rem 1rem;
}

.date-selector-wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 1.5rem;
}

.date-selector {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 1rem;
}

.date-display {
  position: relative;
  font-size: 1.1rem;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
}

.today-container {
  margin-top: 0.25rem;
  display: flex;
  justify-content: center;
}

.go-today {
  font-size: 0.85rem;
  color: var(--primary-color);
  cursor: pointer;
}

.go-today:hover {
  text-decoration: underline;
}

.drawer-actions {
  padding: 0 1rem;
  display: flex;
  gap: 0.5rem;
  margin: 1rem 0;
}

.drawer-actions button {
  flex: 1;
  padding: 0.5rem;
  cursor: pointer;
  background-color: var(--border-color);
  border: none;
  border-radius: 4px;
  color: var(--text-color);
  font-weight: bold;
}

.drawer-actions button:hover {
  background-color: var(--primary-color);
  color: #fff;
}

.timeline {
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}

.event-card {
  display: flex;
  background-color: var(--card-bg);
  border: 1px solid var(--border-color);
  border-radius: 8px;
  overflow: hidden;
  position: relative;
  transition: transform 0.2s;
}

.event-card.has-recordings {
  cursor: pointer;
}

@media (hover: hover) {
  .event-card.has-recordings:hover {
    border-color: var(--primary-color);
  }
}

@media (hover: none) {
  .event-card.active-border {
    border-color: var(--primary-color);
  }
}

.event-time {
  padding: 1rem;
  background-color: var(--border-color);
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
  min-width: 80px;
}

.event-details {
  padding: 1rem;
  flex: 1;
}

.event-header {
  display: flex;
  flex-wrap: nowrap;
  justify-content: space-between;
  align-items: flex-start;
  gap: 0.5rem;
  margin-bottom: 0.25rem;
  font-size: 0.85rem;
  color: var(--text-muted);
}

.event-header-info {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 0.5rem;
}

.star-btn {
  font-size: 1.25rem;
  padding: 0 0.25rem;
  color: var(--text-muted);
  line-height: 1;
  flex-shrink: 0;
}

.star-btn.active {
  color: #ffc107;
  text-shadow: 0 0 2px rgba(255, 193, 7, 0.5);
}

.event-card.is-favorite::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  bottom: 0;
  width: 4px;
  background-color: #ffc107;
  z-index: 10;
}

@media (hover: hover) {
  .event-card.is-favorite.has-recordings:hover {
    border-color: #ffc107;
  }
}

@media (hover: none) {
  .event-card.is-favorite.active-border {
    border-color: #ffc107;
  }
}

.channel-wrapper {
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.channel-logo {
  height: 20px;
  width: auto;
  object-fit: contain;
}

.channel-logo-small {
  height: 14px;
  width: auto;
  object-fit: contain;
}

.event-channel {
  font-weight: bold;
  color: var(--primary-color);
}

.event-content {
  font-size: 1.1rem;
  font-weight: 600;
}

.recording-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--border-color);
  border-radius: 4px;
  font-size: 0.75rem;
  font-weight: bold;
  padding: 0.2rem 0.4rem;
  line-height: 1;
}

.desktop-badge {
  display: inline-flex;
  background-color: var(--badge-bg-desktop);
  color: var(--badge-text-desktop);
}

.mobile-badge {
  display: none;
  margin-top: 0.25rem;
  background-color: var(--badge-bg-mobile);
  color: var(--badge-text-mobile);
}

@media (max-width: 600px) {
  .desktop-badge {
    display: none;
  }
  .mobile-badge {
    display: inline-flex;
  }
  .event-time {
    flex-direction: column;
  }
}

.recordings-container {
  margin-top: 1rem;
  padding-top: 0.5rem;
  border-top: 1px dashed var(--border-color);
  font-size: 0.9rem;
}

.recordings-title {
  font-weight: bold;
  margin-bottom: 0.25rem;
}

.recording-row-single {
  display: flex;
  align-items: center;
  gap: 0.25rem;
}

.recording-row {
  color: var(--text-muted);
  margin-bottom: 0.25rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
  list-style-type: none;
  margin-left: 0.5rem;
  position: relative;
}

.recording-row::before {
  content: "•";
  margin-right: -0.25rem;
}

.no-events {
  text-align: center;
  padding: 2rem;
  color: var(--text-muted);
}

@keyframes slideOutLeft {
  to { transform: translateX(-30%); opacity: 0; }
}
@keyframes slideOutRight {
  to { transform: translateX(30%); opacity: 0; }
}
@keyframes slideInRight {
  from { transform: translateX(30%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}
@keyframes slideInLeft {
  from { transform: translateX(-30%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

.anim-slide-out-left {
  animation: slideOutLeft 0.2s forwards ease-in-out;
}
.anim-slide-out-right {
  animation: slideOutRight 0.2s forwards ease-in-out;
}
.anim-slide-in-right {
  animation: slideInRight 0.2s forwards ease-in-out;
}
.anim-slide-in-left {
  animation: slideInLeft 0.2s forwards ease-in-out;
}

        leagueCb.id = `league-${sport}-${league}`;

        const leagueLabel = document.createElement('label');
        leagueLabel.htmlFor = `league-${sport}-${league}`;
        leagueLabel.textContent = league;
        if (
          ['unseen', 'seen'].includes(
            tvFilterMemory[`l:${sport}|${league}`]?.state
          )
        ) {
          leagueLabel.classList.add('is-new-item');
        }

        leagueCb.addEventListener('change', (e) => {
          sportData.leagues[league] = e.target.checked;
          const allChecked = filters[sport].every((l) => sportData.leagues[l]);
          const someChecked = filters[sport].some((l) => sportData.leagues[l]);
          sportCb.checked = allChecked;
          sportCb.indeterminate = someChecked && !allChecked;
          sportData.all = allChecked;
          saveFilters();
          renderTimeline();
        });

        leagueRow.appendChild(leagueCb);
        leagueRow.appendChild(leagueLabel);
        leaguesDiv.appendChild(leagueRow);
      }

      sportCb.addEventListener('change', (e) => {
        const isChecked = e.target.checked;
        sportData.all = isChecked;
        for (const league of filters[sport]) {
          sportData.leagues[league] = isChecked;
          document.getElementById(`league-${sport}-${league}`).checked =
            isChecked;
        }
        saveFilters();
        renderTimeline();
      });

      const allChecked = filters[sport].every((l) => sportData.leagues[l]);
      const someChecked = filters[sport].some((l) => sportData.leagues[l]);
      sportCb.checked = allChecked;
      sportCb.indeterminate = someChecked && !allChecked;

      sportDiv.appendChild(leaguesDiv);
      container.appendChild(sportDiv);
    }
  };

  const renderTimeline = () => {
    const container = document.getElementById('timeline');
    container.innerHTML = '';

    const events = eventsByDay[currentDate] ?? [];

    const filteredEvents = events.filter((ev) => {
      const sportData = savedFilters[ev.sport];
      if (!sportData) {
        return false;
      }
      if (sportData.leagues[ev.category] === true) {
        return true;
      }
      if (filters[ev.sport] && !filters[ev.sport].includes(ev.category)) {
        return sportData.all;
      }
      return false;
    });

    if (filteredEvents.length === 0) {
      container.innerHTML =
        '<div class="no-events">Nema događaja za izabrani datum i filtere.</div>';
      return;
    }

    for (const ev of filteredEvents) {
      const card = document.createElement('div');
      card.className = 'event-card';
      card.dataset.time = ev.time;

      const timeEl = document.createElement('div');
      timeEl.className = 'event-time';
      timeEl.textContent = ev.time;

      const detailsEl = document.createElement('div');
      detailsEl.className = 'event-details';

      const headerEl = document.createElement('div');
      headerEl.className = 'event-header';

      const headerInfoEl = document.createElement('div');
      headerInfoEl.className = 'event-header-info';

      const channelWrapperEl = document.createElement('div');
      channelWrapperEl.className = 'channel-wrapper';

      const logoSrc = getChannelLogo(ev.channel);
      if (logoSrc) {
        const logoImg = document.createElement('img');
        logoImg.className = 'channel-logo';
        logoImg.src = logoSrc;
        logoImg.alt = ev.channel;
        logoImg.loading = 'lazy';
        channelWrapperEl.appendChild(logoImg);
      } else {
        const channelEl = document.createElement('span');
        channelEl.className = 'event-channel';
        channelEl.textContent = ev.channel;
        channelWrapperEl.appendChild(channelEl);
      }

      const sportEl = document.createElement('span');
      sportEl.className = 'event-sport';
      sportEl.textContent = `${ev.sport} ${ev.category ? '- ' + ev.category : ''}`;

      const matchKey = `${currentDate}-${ev.time}-${ev.content}-${ev.sport}`;
      const isFav = savedFavorites.includes(matchKey);

      const starBtn = document.createElement('button');
      starBtn.className = `icon-btn star-btn ${isFav ? 'active' : ''}`;
      starBtn.innerHTML = isFav ? '★' : '☆';
      starBtn.setAttribute(
        'aria-label',
        isFav ? 'Ukloni iz omiljenih' : 'Dodaj u omiljene'
      );

      if (isFav) {
        card.classList.add('is-favorite');
      }

      starBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        toggleFavorite(matchKey);
      });

      headerInfoEl.appendChild(channelWrapperEl);
      headerInfoEl.appendChild(sportEl);

      headerEl.appendChild(headerInfoEl);
      headerEl.appendChild(starBtn);

      const contentEl = document.createElement('div');
      contentEl.className = 'event-content';
      contentEl.textContent = ev.content;

      detailsEl.appendChild(headerEl);
      detailsEl.appendChild(contentEl);

      card.appendChild(timeEl);
      card.appendChild(detailsEl);

      const recordings = recordingsByMatch[ev.content];
      if (recordings && recordings.length > 0) {
        card.classList.add('has-recordings');

        const badgeEl = document.createElement('span');
        badgeEl.className = 'recording-badge desktop-badge';
        badgeEl.textContent = recordings.length;
        badgeEl.setAttribute('title', `Broj snimaka: ${recordings.length}`);

        headerInfoEl.appendChild(badgeEl);

        const mobileBadgeEl = document.createElement('span');
        mobileBadgeEl.className = 'recording-badge mobile-badge';
        mobileBadgeEl.textContent = recordings.length;
        mobileBadgeEl.setAttribute(
          'title',
          `Broj snimaka: ${recordings.length}`
        );

        timeEl.appendChild(mobileBadgeEl);

        const recContainer = document.createElement('div');
        recContainer.className = 'recordings-container';
        recContainer.style.display = 'none';

        if (recordings.length === 1) {
          const rec = recordings[0];

          const singleRow = document.createElement('div');
          singleRow.className = 'recording-row-single';

          const recTitleText = document.createElement('span');
          recTitleText.style.fontWeight = 'bold';
          recTitleText.textContent = 'Snimak: ';
          singleRow.appendChild(recTitleText);

          const timeText = document.createElement('span');
          timeText.style.color = 'var(--text-muted)';
          timeText.textContent = `${formatDate(rec.date)} u ${rec.time}`;
          singleRow.appendChild(timeText);

          const dash = document.createElement('span');
          dash.style.color = 'var(--text-muted)';
          dash.textContent = ' - ';
          singleRow.appendChild(dash);

          const recLogoSrc = getChannelLogo(rec.channel);
          if (recLogoSrc) {
            const recLogoImg = document.createElement('img');
            recLogoImg.className = 'channel-logo-small';
            recLogoImg.src = recLogoSrc;
            recLogoImg.alt = rec.channel;
            recLogoImg.loading = 'lazy';
            singleRow.appendChild(recLogoImg);
          } else {
            const channelText = document.createElement('span');
            channelText.style.color = 'var(--text-muted)';
            channelText.textContent = rec.channel;
            singleRow.appendChild(channelText);
          }

          recContainer.appendChild(singleRow);
        } else {
          const recTitleText = document.createElement('div');
          recTitleText.className = 'recordings-title';
          recTitleText.textContent = 'Snimci:';
          recContainer.appendChild(recTitleText);

          for (const rec of recordings) {
            const recRow = document.createElement('div');
            recRow.className = 'recording-row';

            const recLogoSrc = getChannelLogo(rec.channel);
            if (recLogoSrc) {
              const recText = document.createElement('span');
              recText.textContent = `${formatDate(rec.date)} u ${rec.time} - `;
              recRow.appendChild(recText);

              const recLogoImg = document.createElement('img');
              recLogoImg.className = 'channel-logo-small';
              recLogoImg.src = recLogoSrc;
              recLogoImg.alt = rec.channel;
              recLogoImg.loading = 'lazy';
              recRow.appendChild(recLogoImg);
            } else {
              const recText = document.createElement('span');
              recText.textContent = `${formatDate(rec.date)} u ${rec.time} - ${rec.channel}`;
              recRow.appendChild(recText);
            }

            recContainer.appendChild(recRow);
          }
        }

        detailsEl.appendChild(recContainer);

        card.addEventListener('click', () => {
          const isHidden = recContainer.style.display === 'none';

          // Remove active-border from all other cards when this one is clicked
          const allCards = document.querySelectorAll('.event-card');
          for (const c of allCards) {
            if (c !== card) {
              c.classList.remove('active-border');
            }
          }

          recContainer.style.display = isHidden ? 'block' : 'none';
          card.classList.toggle('expanded', isHidden);

          if (isHidden) {
            card.classList.add('active-border');
          } else {
            card.classList.remove('active-border');
          }
        });
      }

      container.appendChild(card);
    }
  };

  const scrollToCurrentTime = () => {
    let targetHour = nowBg.hour - 2;
    let targetMinute = nowBg.minute;

    if (targetHour < 0) {
      targetHour = 0;
      targetMinute = 0;
    }

    const targetTimeStr = `${targetHour
      .toString()
      .padStart(2, '0')}:${targetMinute.toString().padStart(2, '0')}`;

    const cards = document.querySelectorAll('.event-card');
    let targetCard = null;

    for (const card of cards) {
      if (card.dataset.time >= targetTimeStr) {
        targetCard = card;
        break;
      }
    }

    if (targetCard) {
      const headerOffset = document.querySelector('.header').offsetHeight + 20;
      const elementPosition = targetCard.getBoundingClientRect().top;
      const offsetPosition = elementPosition + window.scrollY - headerOffset;

      window.scrollTo({
        top: offsetPosition,
        behavior: 'smooth',
      });
    } else if (cards.length > 0) {
      cards[cards.length - 1].scrollIntoView({
        behavior: 'smooth',
        block: 'start',
      });
    }
  };

  // Start app
  renderApp();
})();

    </script>
  </body>
</html>
